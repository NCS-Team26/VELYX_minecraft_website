name: Website check

on:
  pull_request:
  push:
    branches-ignore:
      - main

jobs:
  build:
    name: Build website and plugin
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build website
        run: npm run build

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build AuroraLink plugin
        working-directory: minecraft-plugin/aurora-link
        run: ./gradlew build --no-daemon

name: Setup auth backend on AWS

on:
  workflow_dispatch:
    inputs:
      allow_aws_costs:
        description: "Type 1 to allow AWS resource updates and possible charges"
        required: true
        default: "0"

concurrency:
  group: aws-auth-setup
  cancel-in-progress: false

jobs:
  setup-auth:
    name: Create auth DB/API
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    env:
      AWS_REGION: ${{ secrets.AWS_REGION || 'ap-northeast-1' }}
      AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION || 'ap-northeast-1' }}
      SITE_DOMAIN: ${{ secrets.SITE_DOMAIN || 'www.velyx.kr' }}
      AUTH_STACK_NAME: velyx-auth
      AUTH_MIGRATE_FROM_STACK: nfoifsb-auth
      AUTH_ALLOWED_ORIGINS: ${{ secrets.AUTH_ALLOWED_ORIGINS || 'https://www.velyx.kr,https://velyx.kr,http://127.0.0.1:5173,http://localhost:5173' }}
      AUTH_PEPPER: ${{ secrets.AUTH_PEPPER }}
      AUTH_EMAIL_FROM: ${{ secrets.AUTH_EMAIL_FROM }}
      AUTH_APP_BASE_URL: ${{ secrets.AUTH_APP_BASE_URL || 'https://www.velyx.kr' }}
      AUTH_LAMBDA_RUNTIME: ${{ secrets.AUTH_LAMBDA_RUNTIME || 'nodejs22.x' }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID || secrets.VITE_GOOGLE_CLIENT_ID }}
      ALLOW_AWS_COSTS: ${{ inputs.allow_aws_costs }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Stop unless AWS costs are explicitly allowed
        if: ${{ inputs.allow_aws_costs != '1' }}
        run: |
          echo "AWS auth setup is blocked. Re-run with allow_aws_costs=1 only when intentional."
          exit 1

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::358982198253:role/GitHubActionsMincraftServerWebsiteDeployRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Create or update auth backend
        run: npm run auth:setup:aws

      - name: Show Vite auth env
        run: |
          echo "Add this value as the VITE_AUTH_API_BASE repository secret before production deploy:" >> "$GITHUB_STEP_SUMMARY"
          cat .env.auth.generated >> "$GITHUB_STEP_SUMMARY"

      - name: Upload auth setup output
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: auth-output
          path: |
            auth-output.json
            .env.auth.generated
          if-no-files-found: ignore

name: Setup auth backend on AWS

on:
  workflow_dispatch:

concurrency:
  group: aws-auth-setup
  cancel-in-progress: false

jobs:
  setup-auth:
    name: Create auth DB/API
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    env:
      AWS_REGION: ${{ secrets.AWS_REGION || 'ap-northeast-1' }}
      AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION || 'ap-northeast-1' }}
      SITE_DOMAIN: ${{ secrets.SITE_DOMAIN || 'www.nfoifsb.kr' }}
      AUTH_STACK_NAME: ${{ secrets.AUTH_STACK_NAME || 'nfoifsb-auth' }}
      AUTH_ALLOWED_ORIGINS: ${{ secrets.AUTH_ALLOWED_ORIGINS || 'https://www.nfoifsb.kr,http://127.0.0.1:5173,http://localhost:5173' }}
      AUTH_PEPPER: ${{ secrets.AUTH_PEPPER }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::358982198253:role/GitHubActionsMincraftServerWebsiteDeployRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Create or update auth backend
        run: npm run auth:setup:aws

      - name: Show Vite auth env
        run: |
          echo "Add this value as the VITE_AUTH_API_BASE repository secret before production deploy:" >> "$GITHUB_STEP_SUMMARY"
          cat .env.auth.generated >> "$GITHUB_STEP_SUMMARY"

      - name: Upload auth setup output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: auth-output
          path: |
            auth-output.json
            .env.auth.generated
          if-no-files-found: ignore

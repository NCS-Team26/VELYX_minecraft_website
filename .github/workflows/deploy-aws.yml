name: Deploy website to AWS

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      allow_aws_costs:
        description: "Type 1 to allow AWS resource updates and possible charges"
        required: true
        default: "0"

concurrency:
  group: aws-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    env:
      AWS_REGION: ${{ secrets.AWS_REGION || 'ap-northeast-1' }}
      AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION || 'ap-northeast-1' }}
      CERTIFICATE_ARN: ${{ secrets.CERTIFICATE_ARN || 'arn:aws:acm:us-east-1:358982198253:certificate/4ee2b26e-b3fb-4856-84c4-62030cb5ce62' }}
      SITE_BUCKET: ${{ secrets.SITE_BUCKET || 'menhera-minecraft-server-website' }}
      SITE_DOMAIN: ${{ secrets.SITE_DOMAIN || 'www.nfoifsb.kr' }}
      VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
      VITE_AUTH_API_BASE: ${{ secrets.VITE_AUTH_API_BASE }}
      VITE_PLAYER_API_BASE: ${{ secrets.VITE_PLAYER_API_BASE }}
      ALLOW_AWS_COSTS: ${{ github.event_name == 'workflow_dispatch' && inputs.allow_aws_costs || '1' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Stop unless AWS costs are explicitly allowed
        if: ${{ env.ALLOW_AWS_COSTS != '1' }}
        run: |
          echo "AWS deploy is blocked. Re-run with allow_aws_costs=1 only when intentional."
          exit 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::358982198253:role/GitHubActionsMincraftServerWebsiteDeployRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Build and deploy to AWS
        run: npm run deploy:aws

      - name: Upload deploy output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-output
          path: deploy-output.json
          if-no-files-found: ignore

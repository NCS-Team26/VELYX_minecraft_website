name: Deploy website to AWS

on:
  workflow_dispatch:
    inputs:
      allow_aws_costs:
        description: "Type 1 to allow AWS resource updates and possible charges"
        required: true
        default: "0"

concurrency:
  group: aws-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    env:
      AWS_REGION: ${{ secrets.AWS_REGION || 'ap-northeast-1' }}
      AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION || 'ap-northeast-1' }}
      CERTIFICATE_ARN: ${{ secrets.CERTIFICATE_ARN || 'arn:aws:acm:us-east-1:358982198253:certificate/4ee2b26e-b3fb-4856-84c4-62030cb5ce62' }}
      SITE_BUCKET: ${{ secrets.SITE_BUCKET || 'menhera-minecraft-server-website' }}
      SITE_DOMAIN: ${{ secrets.SITE_DOMAIN || 'www.nfoifsb.kr' }}
      AUTH_STACK_NAME: ${{ secrets.AUTH_STACK_NAME || 'nfoifsb-auth' }}
      AUTH_ALLOWED_ORIGINS: ${{ secrets.AUTH_ALLOWED_ORIGINS }}
      AUTH_PEPPER: ${{ secrets.AUTH_PEPPER }}
      AUTH_EMAIL_FROM: ${{ secrets.AUTH_EMAIL_FROM }}
      AUTH_APP_BASE_URL: ${{ secrets.AUTH_APP_BASE_URL }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID || secrets.VITE_GOOGLE_CLIENT_ID }}
      VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
      VITE_AUTH_API_BASE: ${{ secrets.VITE_AUTH_API_BASE }}
      VITE_PLAYER_API_BASE: /minecraft
      VITE_PLAYER_API_FALLBACK_BASES: https://minecraftserver1.tail16d543.ts.net/minecraft,https://api.nfoifsb.kr/minecraft
      PLAYER_API_ORIGIN_DOMAIN: minecraftserver1.tail16d543.ts.net
      ALLOW_AWS_COSTS: ${{ inputs.allow_aws_costs }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Stop unless AWS costs are explicitly allowed
        if: ${{ env.ALLOW_AWS_COSTS != '1' }}
        run: |
          echo "AWS deploy is blocked. Re-run with allow_aws_costs=1 only when intentional."
          exit 1

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::358982198253:role/GitHubActionsMincraftServerWebsiteDeployRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Create or update auth backend
        run: npm run auth:setup:aws

      - name: Use generated auth API for Vite build
        shell: bash
        run: |
          if [ ! -s .env.auth.generated ]; then
            echo ".env.auth.generated was not created by auth setup." >&2
            exit 1
          fi
          cat .env.auth.generated >> "$GITHUB_ENV"

      - name: Build and deploy to AWS
        run: npm run deploy:aws

      - name: Upload deploy output
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: deploy-output
          path: |
            deploy-output.json
            auth-output.json
            .env.auth.generated
          if-no-files-found: ignore

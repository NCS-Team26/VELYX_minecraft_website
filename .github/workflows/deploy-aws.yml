name: Deploy website to AWS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: aws-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ secrets.AWS_REGION || 'ap-northeast-2' }}
      AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION || 'ap-northeast-2' }}
      CERTIFICATE_ARN: ${{ secrets.CERTIFICATE_ARN }}
      SITE_BUCKET: ${{ secrets.SITE_BUCKET }}
      SITE_DOMAIN: ${{ secrets.SITE_DOMAIN }}
      VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check AWS secrets
        shell: bash
        run: |
          if [[ -z "$AWS_ACCESS_KEY_ID" || -z "$AWS_SECRET_ACCESS_KEY" ]]; then
            echo "::error::Set AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY in GitHub repository secrets."
            exit 1
          fi

      - name: Build and deploy to AWS
        run: npm run deploy:aws

      - name: Upload deploy output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-output
          path: deploy-output.json
          if-no-files-found: ignore
